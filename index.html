<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>织里童装爆款预测 SaaS 演示</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">织</div>
          <div>
            <strong id="brandTitle">供应商端 SaaS</strong>
            <span id="brandSub">选款与内容生成工作台</span>
          </div>
        </div>
        <div class="system-switch" role="tablist" aria-label="系统切换">
          <button class="system-tab active" data-system="supplier">用户端</button>
          <button class="system-tab" data-system="admin">后台</button>
        </div>
        <nav class="nav-list" id="navList" aria-label="主导航"></nav>
        <div class="sidebar-card">
          <strong id="sideCardTitle">旗舰版试用中</strong>
          <span id="sideCardText">剩余额度会随演示操作实时变化</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="systemLabel">供应商端 SaaS</p>
            <h1 id="pageTitle">预测首页</h1>
            <p id="pageDesc">未来 7/14/30 天款式预测、商详图片风格生成与内容制作演示。</p>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" id="demoReset">重置演示数据</button>
            <button class="primary-btn" id="primaryAction">开始生成</button>
          </div>
        </header>

        <section id="pageRoot" class="page-root" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status"></div>
    <script src="./script.js"></script>
  </body>
</html>
